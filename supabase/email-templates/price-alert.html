<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>TradeX Price Alert</title></head>

    </td></tr>

      <ul style="color:#ccc;font-size:14px;line-height:1.8;padding-left:20px;">

        <li>Change: <span style="color:#00C853;">+1.4%</span></li>
      </ul>
    </td></tr>
    <tr><td style="padding:24px 0;text-align:center;">
      <a href="#" style="display:inline-block;background:#2962FF;color:#fff;font-weight:700;text-decoration:none;padding:14px 32px;border-radius:8px;">View Dashboard</a>

  </table>

</html>
